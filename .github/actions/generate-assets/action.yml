name: "Fetch packages, generate assets, and build"
description: "Runs a dry-run flutter build to fetch/register assets, then runs the actual build for deployment"

inputs:
  GITHUB_TOKEN:
    description: "The GitHub API public readonly token"
    required: true
  BUILD_COMMAND:
    description: "The flutter build command to run to generate assets for the deployment build"
    required: false
    default: "flutter build web --no-pub --release"

  # Optional Trello feedback provider configuration
  TRELLO_API_KEY:
    description: "Trello API key for feedback service"
    required: false
    default: ""
  TRELLO_TOKEN:
    description: "Trello token for feedback service"
    required: false
    default: ""
  TRELLO_BOARD_ID:
    description: "Trello board ID for feedback service"
    required: false
    default: ""
  TRELLO_LIST_ID:
    description: "Trello list ID for feedback service"
    required: false
    default: ""

  # Optional Cloudflare feedback provider configuration
  FEEDBACK_API_KEY:
    description: "API key for Cloudflare feedback service"
    required: false
    default: ""
  FEEDBACK_PRODUCTION_URL:
    description: "Production URL for Cloudflare feedback service"
    required: false
    default: ""

  # Optional Matomo analytics configuration
  MATOMO_URL:
    description: "Matomo server base URL"
    required: false
    default: ""
  MATOMO_SITE_ID:
    description: "Matomo site ID"
    required: false
    default: ""
  ANALYTICS_DISABLED:
    description: "Disable analytics collection (true/false)"
    required: false
    default: ""

runs:
  using: "composite"
  steps:
    - name: Determine commit hash
      shell: bash
      run: |
        echo "Determining commit hash..."
        if [ "$GITHUB_EVENT_NAME" = "pull_request" ]; then
          PR_SHA=$(jq -r .pull_request.head.sha "$GITHUB_EVENT_PATH")
          COMMIT_HASH=${PR_SHA:0:7}
          echo "Detected pull_request event. Using PR HEAD SHA: $COMMIT_HASH"
        else
          COMMIT_HASH=$(git rev-parse --short HEAD | cut -c1-7)
          echo "Using git HEAD SHA: $COMMIT_HASH"
        fi
        echo "COMMIT_HASH=$COMMIT_HASH" >> $GITHUB_ENV

    - name: Fetch packages and generate assets
      shell: bash
      env:
        GITHUB_API_PUBLIC_READONLY_TOKEN: ${{ inputs.GITHUB_TOKEN }}
        TRELLO_API_KEY: ${{ inputs.TRELLO_API_KEY }}
        TRELLO_TOKEN: ${{ inputs.TRELLO_TOKEN }}
        TRELLO_BOARD_ID: ${{ inputs.TRELLO_BOARD_ID }}
        TRELLO_LIST_ID: ${{ inputs.TRELLO_LIST_ID }}
        FEEDBACK_API_KEY: ${{ inputs.FEEDBACK_API_KEY }}
        FEEDBACK_PRODUCTION_URL: ${{ inputs.FEEDBACK_PRODUCTION_URL }}
        MATOMO_URL: ${{ inputs.MATOMO_URL }}
        MATOMO_SITE_ID: ${{ inputs.MATOMO_SITE_ID }}
        ANALYTICS_DISABLED: ${{ inputs.ANALYTICS_DISABLED }}
      run: |
        echo "Running \`flutter build\` to generate assets for the deployment build"

        if [ -n "$GITHUB_API_PUBLIC_READONLY_TOKEN" ]; then
          echo "GITHUB_TOKEN provided"
        else
          unset GITHUB_API_PUBLIC_READONLY_TOKEN
        fi

        # Prepare build command
        BUILD_CMD="${{ inputs.BUILD_COMMAND }}"
        BUILD_CMD="$BUILD_CMD --dart-define=COMMIT_HASH=$COMMIT_HASH"

        # Trello logic
        HAVE_TRELLO_IDS=false
        if [ -n "$TRELLO_BOARD_ID" ] && [ -n "$TRELLO_LIST_ID" ]; then
          HAVE_TRELLO_IDS=true
          BUILD_CMD="$BUILD_CMD --dart-define=TRELLO_BOARD_ID=$TRELLO_BOARD_ID"
          BUILD_CMD="$BUILD_CMD --dart-define=TRELLO_LIST_ID=$TRELLO_LIST_ID"
        fi

        if [ "$HAVE_TRELLO_IDS" = true ] && [ -n "$TRELLO_API_KEY" ] && [ -n "$TRELLO_TOKEN" ]; then
          BUILD_CMD="$BUILD_CMD --dart-define=TRELLO_API_KEY=$TRELLO_API_KEY"
          BUILD_CMD="$BUILD_CMD --dart-define=TRELLO_TOKEN=$TRELLO_TOKEN"
        fi

        # Cloudflare logic
        if [ "$HAVE_TRELLO_IDS" = true ] && [ -n "$FEEDBACK_API_KEY" ] && [ -n "$FEEDBACK_PRODUCTION_URL" ]; then
          BUILD_CMD="$BUILD_CMD --dart-define=FEEDBACK_API_KEY=$FEEDBACK_API_KEY"
          BUILD_CMD="$BUILD_CMD --dart-define=FEEDBACK_PRODUCTION_URL=$FEEDBACK_PRODUCTION_URL"
        fi

        # Matomo logic
        HAS_MATOMO_CONFIG=false
        if [ -n "$MATOMO_URL" ] && [ -n "$MATOMO_SITE_ID" ]; then
          HAS_MATOMO_CONFIG=true
          BUILD_CMD="$BUILD_CMD --dart-define=MATOMO_URL=$MATOMO_URL"
          BUILD_CMD="$BUILD_CMD --dart-define=MATOMO_SITE_ID=$MATOMO_SITE_ID"
        fi

        if [ "$ANALYTICS_DISABLED" = "true" ]; then
          BUILD_CMD="$BUILD_CMD --dart-define=ANALYTICS_DISABLED=true"
        elif [ "$CI" = "true" ] && [ "$HAS_MATOMO_CONFIG" != "true" ]; then
          BUILD_CMD="$BUILD_CMD --dart-define=CI=true --dart-define=ANALYTICS_DISABLED=true"
        fi

        # =====================================================================
        # ASSET LOBOTOMY: Locking to legacy b8f856 commit
        # =====================================================================
        echo "Latching build_config.json to legacy commit b8f8566..."
        
        pwsh -Command "
          \$path = 'sdk/packages/komodo_defi_framework/app_build/build_config.json'
          if (Test-Path \$path) {
            \$json = Get-Content \$path | ConvertFrom-Json
            # Force the 3-month-old hash
            \$json.coinCIConfig.bundled_coins_repo_commit = 'b8f85666325ca1cc6306ca113e7129d73e77e0f0'
            # Disable the auto-updater
            \$json.coinCIConfig.updateCommitOnBuild = \$false
            \$json | ConvertTo-Json -Depth 10 | Set-Content \$path
            Write-Host 'JSON successfully modified for legacy build.'
          }
        "

        # Manually drop the correct coins.json file
        mkdir -p sdk/packages/komodo_defi_framework/assets/config/
        curl -L https://raw.githubusercontent.com/KomodoPlatform/coins/b8f85666325ca1cc6306ca113e7129d73e77e0f0/coins -o sdk/packages/komodo_defi_framework/assets/config/coins.json
        # =====================================================================

        # Run dummy build to register assets
        echo "Running Dummy Build..."
        flutter pub get --enforce-lockfile > /dev/null 2>&1 || true
        $BUILD_CMD > /dev/null 2>&1 || true
        
        # Nuke cache so Flutter sees the new (old) coins.json
        flutter clean

        # Final Build
        echo "Running Final Build..."
        flutter pub get --enforce-lockfile
        echo "Running build command: $BUILD_CMD"
        set +e
        $BUILD_CMD
        exit_status=$?
        set -e

        if [ $exit_status -ne 0 ]; then
            echo "Flutter build exited with status $exit_status"
            exit $exit_status
        fi
        echo "Done fetching packages and generating assets"
